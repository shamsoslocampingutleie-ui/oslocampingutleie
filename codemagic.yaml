workflows:
  ios-app-store:
    name: iOS — App Store
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      xcode: 26.1
      node: 22
      groups:
        - App Store Connect
        - iOS Signing
      vars:
        BUNDLE_ID: no.leieplattform.app
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Install certificate and profile
        script: |
          # Import certificate into keychain
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P $CM_CERTIFICATE_PASSWORD \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $CM_PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

          # Create ExportOptions.plist for App Store distribution
          cat > /Users/builder/export_options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>9L8XF547T2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>no.leieplattform.app</key>
              <string>Leieplattform AppStore</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Set build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          LATEST=${LATEST:-0}
          # Ensure build number is always higher than any previously uploaded build
          BUILD_NUM=$(( LATEST + 1 ))
          if [ "$BUILD_NUM" -le 1 ]; then BUILD_NUM=100; fi
          echo "Previous build: $LATEST — New build: $BUILD_NUM"
          agvtool new-version -all $BUILD_NUM
        working_directory: ios/App

      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users
        submit_to_app_store: false
      email:
        recipients:
          - shams.noor@eidsvoll.kommune.no
        notify:
          success: true
          failure: true
